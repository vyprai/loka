<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOKA Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    /* ── shadcn zinc tokens ────────── */
    :root {
      --base-font-family: 'Inter', -apple-system, system-ui, sans-serif;
      --base-font-size: 14px;
      --base-line-height: 1.65;
      --theme-color: #fafafa;
      --mono-font-family: 'Geist Mono', 'SF Mono', monospace;
      --sidebar-width: 220px;
      --sidebar-background: #09090b;
      --sidebar-border-color: #27272a;
      --sidebar-nav-link-color: #71717a;
      --sidebar-nav-link-color--active: #fafafa;
      --sidebar-nav-link-border-color--active: transparent;
      --sidebar-nav-link-background-color--active: #18181b;
      --code-font-size: 0.85em;
      --blockquote-border-color: #27272a;
      --link-color: #d4d4d8;
      --link-color--hover: #fafafa;
      /* Force all backgrounds to pure black */
      --base-background-color: #09090b;
      --cover-background-color: #09090b;
      --search-background: #18181b;
    }
    /* ── Force overrides on docsify theme ── */
    body { background: #09090b !important; color: #a1a1aa; }
    .app-sub-sidebar, .sidebar, .sidebar-nav, aside.sidebar { background: #09090b !important; }
    section.content, .content, main { background: #09090b !important; }
    .app-name-link { color: #fafafa !important; font-family: var(--mono-font-family); letter-spacing: 0.06em; font-size: 0.9em; font-weight: 600; }

    /* ── Sidebar ───────────────────── */
    .sidebar { border-right: 1px solid #1c1c1f !important; }
    .sidebar-nav > ul > li > a { font-weight: 500; font-size: 0.68em; letter-spacing: 0.05em; text-transform: uppercase; color: #52525b !important; margin-top: 0.5em; }
    .sidebar-nav > ul > li > ul > li > a { font-size: 0.82em; color: #71717a !important; padding: 0.18em 0 0.18em 0.6em; }
    .sidebar-nav > ul > li > ul > li > a:hover { color: #d4d4d8 !important; }
    .sidebar-nav li.active > a { color: #fafafa !important; font-weight: 500; background: transparent !important; }
    .sidebar-nav li > a::before { display: none !important; }
    .sidebar-nav ul li a { padding-left: 0; border: none !important; }

    /* ── Cards ──────────────────────── */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin: 1.2em 0; }
    .card { background: #09090b; border: 1px solid #27272a; border-radius: 8px; padding: 0.9em 1em; transition: all 0.15s; text-decoration: none !important; display: block; }
    .card:hover { border-color: #3f3f46; }
    .card-icon { font-size: 1.1em; margin-bottom: 0.2em; }
    .card-title { font-weight: 500; color: #d4d4d8; font-size: 0.85em; margin-bottom: 0.1em; }
    .card-desc { color: #52525b; font-size: 0.75em; line-height: 1.4; }

    /* ── Steps ──────────────────────── */
    .steps { counter-reset: step; margin: 1.2em 0; }
    .step { position: relative; padding-left: 2.5em; margin-bottom: 1.5em; }
    .step::before { counter-increment: step; content: counter(step); position: absolute; left: 0; top: 0.1em; width: 1.6em; height: 1.6em; background: #18181b; color: #71717a; border: 1px solid #27272a; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.75em; font-family: var(--mono-font-family); }
    .step h3 { margin-top: 0 !important; padding-top: 0; }

    /* ── Callouts ───────────────────── */
    .tip, .warning, .info { padding: 0.6em 0.85em; border-radius: 6px; margin: 1em 0; font-size: 0.85em; border: 1px solid; }
    .tip { background: #09090b; border-color: #27272a; color: #a1a1aa; }
    .tip strong { color: #d4d4d8; }
    .warning { background: #09090b; border-color: #7f1d1d; color: #fca5a5; }
    .info { background: #09090b; border-color: #1e3a5f; color: #93c5fd; }

    /* ── Hero ───────────────────────── */
    .hero { text-align: center; padding: 2em 0 0.5em; }
    .hero h1 { font-size: 2em !important; border: none !important; color: #fafafa !important; font-weight: 700; letter-spacing: -0.03em; }
    .hero p { color: #52525b; font-size: 0.95em; max-width: 440px; margin: 0.2em auto 1.2em; }
    .hero-badges { display: none; }

    /* ── Content ────────────────────── */
    .markdown-section { color: #a1a1aa; }
    .markdown-section h1 { font-size: 1.5em; font-weight: 600; border-bottom: none !important; color: #fafafa; letter-spacing: -0.02em; }
    .markdown-section h2 { font-size: 1.1em; font-weight: 600; margin-top: 2em; padding-bottom: 0.35em; border-bottom: 1px solid #18181b !important; color: #d4d4d8; }
    .markdown-section h3 { font-size: 0.95em; font-weight: 600; color: #d4d4d8; margin-top: 1.5em; }
    .markdown-section p { color: #a1a1aa; }
    .markdown-section strong { color: #d4d4d8; font-weight: 500; }
    .markdown-section a { color: #a1a1aa !important; text-decoration: underline !important; text-underline-offset: 3px; text-decoration-color: #3f3f46 !important; border: none !important; }
    .markdown-section a:hover { color: #fafafa !important; text-decoration-color: #71717a !important; }
    .markdown-section li { color: #a1a1aa; }
    .markdown-section li::marker { color: #3f3f46; }
    .markdown-section hr { border-color: #18181b !important; }

    /* ── Tables ─────────────────────── */
    .markdown-section table { font-size: 0.82em; border-collapse: collapse; width: 100%; }
    .markdown-section th { font-family: var(--mono-font-family); font-size: 0.7em; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: #52525b; padding: 0.5em 0.7em; border-bottom: 1px solid #27272a; text-align: left; background: transparent; }
    .markdown-section td { padding: 0.45em 0.7em; border-bottom: 1px solid #18181b; color: #a1a1aa; }
    .markdown-section tr:hover td { background: #0c0c0e; }

    /* ── Code ───────────────────────── */
    .markdown-section code { font-family: var(--mono-font-family); font-size: 0.82em; background: #18181b; padding: 0.12em 0.35em; border-radius: 3px; color: #d4d4d8; border: none; }
    .markdown-section pre { background: #0c0c0e !important; border: 1px solid #1c1c1f !important; border-radius: 6px; padding: 0.9em 1em !important; }
    .markdown-section pre code { background: none !important; border: none; padding: 0; color: #a1a1aa; font-size: 0.82em; line-height: 1.55; }

    /* ── Blockquote ─────────────────── */
    .markdown-section blockquote { border-left: 2px solid #27272a; background: transparent; padding: 0.5em 1em; color: #52525b; }

    /* ── Right TOC ─────────────────── */
    .page-toc { position: fixed; top: 0; right: 0; width: 190px; height: 100vh; overflow-y: auto; padding: 2em 0.8em 2em 0; z-index: 10; }
    .page-toc .toc-title { font-family: var(--mono-font-family); font-size: 0.6em; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: #3f3f46; margin-bottom: 0.7em; padding-left: 0.7em; }
    .page-toc ul { list-style: none; padding: 0; margin: 0; }
    .page-toc li { margin: 0; }
    .page-toc a { display: block; padding: 0.15em 0.7em; font-size: 0.73em; color: #3f3f46; text-decoration: none !important; border-left: 1px solid transparent; transition: color 0.1s; line-height: 1.45; }
    .page-toc a:hover { color: #71717a; }
    .page-toc a.active { color: #d4d4d8; border-left-color: #52525b; }
    .page-toc li[data-level="3"] a { padding-left: 1.3em; font-size: 0.7em; }

    .content { margin-right: 190px; }
    section.content { padding-right: 0.5em; }

    /* ── Search ─────────────────────── */
    .search input { background: #18181b !important; border: 1px solid #27272a !important; border-radius: 6px !important; color: #a1a1aa !important; font-family: var(--base-font-family) !important; font-size: 0.85em !important; }
    .search input::placeholder { color: #3f3f46 !important; }
    .search input:focus { border-color: #3f3f46 !important; }
    .search .matching-post { background: #18181b !important; border-color: #27272a !important; }

    /* ── Docsify tabs ───────────────── */
    .docsify-tabs__tab { font-family: var(--mono-font-family) !important; font-size: 0.75em !important; color: #3f3f46 !important; border: none !important; padding: 0.35em 0.7em !important; background: transparent !important; }
    .docsify-tabs__tab--active { color: #fafafa !important; border-bottom: 1px solid #fafafa !important; }
    .docsify-tabs { border: none !important; background: transparent !important; }
    .docsify-tabs__content { background: transparent !important; }

    /* ── Copy button ───────────────── */
    .docsify-copy-code-button { font-family: var(--mono-font-family) !important; font-size: 0.65em !important; color: #3f3f46 !important; background: transparent !important; }
    .docsify-copy-code-button:hover { color: #71717a !important; }

    /* ── GitHub corner ─────────────── */
    .github-corner svg { fill: #18181b !important; color: #09090b !important; }

    @media (max-width: 1100px) { .page-toc { display: none; } .content { margin-right: 0; } section.content { padding-right: 0; } }
    @media (max-width: 600px) { .card-grid { grid-template-columns: 1fr; } .hero h1 { font-size: 1.5em !important; } }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'LOKA',
      nameLink: '/',
      repo: 'https://github.com/rizqme/loka',
      loadSidebar: true,
      subMaxLevel: 0,
      toc: { tocMaxLevel: 3, target: 'h2, h3' },
      search: { placeholder: 'Search docs...', noData: 'No results', depth: 3 },
      auto2top: true,
      executeScript: true,
      tabs: { persist: true, sync: true, theme: 'classic' },
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1/dist/docsify-tabs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-go.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-protobuf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script>
    // Right-side "On this page" TOC plugin
    function pageTocPlugin(hook) {
      var tocEl;
      hook.doneEach(function() {
        if (tocEl) tocEl.remove();
        var content = document.querySelector('.markdown-section');
        if (!content) return;
        var headings = content.querySelectorAll('h2, h3');
        if (headings.length < 2) return;

        tocEl = document.createElement('div');
        tocEl.className = 'page-toc';

        var title = document.createElement('div');
        title.className = 'toc-title';
        title.textContent = 'On this page';
        tocEl.appendChild(title);

        var ul = document.createElement('ul');
        headings.forEach(function(h) {
          var li = document.createElement('li');
          var level = h.tagName.toLowerCase() === 'h3' ? '3' : '2';
          li.setAttribute('data-level', level);

          var a = document.createElement('a');
          var anchor = h.querySelector('a');
          if (anchor) a.href = anchor.getAttribute('href');
          a.textContent = h.textContent.replace(/^#/, '').trim();
          a.addEventListener('click', function(e) {
            e.preventDefault();
            h.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });

          li.appendChild(a);
          ul.appendChild(li);
        });
        tocEl.appendChild(ul);
        document.body.appendChild(tocEl);

        // Scroll spy
        var links = tocEl.querySelectorAll('a');
        function updateActive() {
          var current = null;
          headings.forEach(function(h, i) {
            if (h.getBoundingClientRect().top <= 80) current = i;
          });
          links.forEach(function(a, i) {
            a.classList.toggle('active', i === current);
          });
        }
        window.addEventListener('scroll', updateActive, { passive: true });
        updateActive();
      });
    }
    window.$docsify.plugins = (window.$docsify.plugins || []).concat(pageTocPlugin);
  </script>
</body>
</html>
