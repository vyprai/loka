<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOKA Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      --base-font-family: 'Inter', -apple-system, system-ui, sans-serif;
      --base-font-size: 14.5px;
      --base-line-height: 1.7;
      --theme-color: #fafafa;
      --mono-font-family: 'Geist Mono', 'SF Mono', monospace;
      --sidebar-width: 240px;
      --sidebar-nav-link-color--active: #fafafa;
      --sidebar-nav-link-border-color--active: #fafafa;
      --sidebar-background: #09090b;
      --code-font-size: 0.85em;
      --blockquote-border-color: #27272a;
      --link-color: #a1a1aa;
      --zn-1: #09090b;
      --zn-2: #0c0c0e;
      --zn-3: #18181b;
      --zn-4: #27272a;
      --zn-5: #3f3f46;
      --zn-6: #52525b;
      --zn-7: #71717a;
      --zn-8: #a1a1aa;
      --zn-9: #d4d4d8;
      --zn-10: #fafafa;
    }
    body { background: var(--zn-2); color: var(--zn-8); }
    .app-name-link { color: var(--zn-10) !important; font-family: var(--mono-font-family); letter-spacing: 0.06em; font-size: 0.95em; font-weight: 600; }

    /* ── Sidebar ───────────────────── */
    .sidebar { border-right: 1px solid var(--zn-4) !important; }
    .sidebar-nav > ul > li > a { font-weight: 500; font-size: 0.7em; letter-spacing: 0.05em; text-transform: uppercase; color: var(--zn-6) !important; margin-top: 0.6em; }
    .sidebar-nav > ul > li > ul > li > a { font-size: 0.85em; color: var(--zn-7) !important; }
    .sidebar-nav > ul > li > ul > li > a:hover { color: var(--zn-9) !important; }
    .sidebar-nav li.active > a { color: var(--zn-10) !important; font-weight: 500; }
    .sidebar-nav li > a::before { display: none !important; }
    .sidebar-nav ul li a { padding-left: 0; border: none !important; }

    /* ── Cards ──────────────────────── */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin: 1.5em 0; }
    .card { background: var(--zn-1); border: 1px solid var(--zn-4); border-radius: 8px; padding: 1em 1.1em; transition: all 0.15s; text-decoration: none !important; display: block; }
    .card:hover { border-color: var(--zn-5); background: var(--zn-3); }
    .card-icon { font-size: 1.2em; margin-bottom: 0.3em; }
    .card-title { font-weight: 600; color: var(--zn-9); font-size: 0.88em; margin-bottom: 0.15em; }
    .card-desc { color: var(--zn-7); font-size: 0.78em; line-height: 1.45; }

    /* ── Steps ──────────────────────── */
    .steps { counter-reset: step; margin: 1.5em 0; }
    .step { position: relative; padding-left: 2.8em; margin-bottom: 1.8em; }
    .step::before { counter-increment: step; content: counter(step); position: absolute; left: 0; top: 0; width: 1.8em; height: 1.8em; background: var(--zn-3); color: var(--zn-8); border: 1px solid var(--zn-4); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.8em; font-family: var(--mono-font-family); }
    .step h3 { margin-top: 0 !important; padding-top: 0.1em; }

    /* ── Callouts ───────────────────── */
    .tip, .warning, .info { padding: 0.7em 0.9em; border-radius: 6px; margin: 1em 0; font-size: 0.88em; border: 1px solid; }
    .tip { background: var(--zn-3); border-color: var(--zn-4); }
    .tip strong { color: var(--zn-9); }
    .warning { background: #1c1210; border-color: #3b1a1a; color: #f87171; }
    .warning strong { color: #fca5a5; }
    .info { background: #0c1420; border-color: #1a2a40; color: #60a5fa; }
    .info strong { color: #93c5fd; }

    /* ── Hero ───────────────────────── */
    .hero { text-align: center; padding: 2.5em 0 1em; }
    .hero h1 { font-size: 2.2em !important; border: none !important; color: var(--zn-10) !important; font-weight: 700; letter-spacing: -0.03em; }
    .hero p { color: var(--zn-7); font-size: 1em; max-width: 480px; margin: 0.3em auto 1.5em; }
    .hero-badges { display: none; }

    /* ── Content typography ─────────── */
    .markdown-section h1 { font-size: 1.65em; font-weight: 700; border-bottom: none; color: var(--zn-10); letter-spacing: -0.02em; }
    .markdown-section h2 { font-size: 1.2em; font-weight: 600; margin-top: 2.2em; padding-bottom: 0.4em; border-bottom: 1px solid var(--zn-4); color: var(--zn-9); }
    .markdown-section h3 { font-size: 1em; font-weight: 600; color: var(--zn-9); margin-top: 1.8em; }
    .markdown-section p { color: var(--zn-8); }
    .markdown-section strong { color: var(--zn-9); font-weight: 600; }
    .markdown-section a { color: var(--zn-9); text-decoration: underline; text-underline-offset: 3px; text-decoration-color: var(--zn-5); border: none !important; }
    .markdown-section a:hover { text-decoration-color: var(--zn-8); color: var(--zn-10); }
    .markdown-section li { color: var(--zn-8); }
    .markdown-section li::marker { color: var(--zn-6); }

    /* ── Tables ─────────────────────── */
    .markdown-section table { font-size: 0.85em; border-collapse: collapse; width: 100%; }
    .markdown-section th { font-family: var(--mono-font-family); font-size: 0.72em; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: var(--zn-6); padding: 0.6em 0.8em; border-bottom: 1px solid var(--zn-4); text-align: left; }
    .markdown-section td { padding: 0.55em 0.8em; border-bottom: 1px solid var(--zn-3); color: var(--zn-8); }
    .markdown-section tr:hover td { background: var(--zn-3); }

    /* ── Code ───────────────────────── */
    .markdown-section code { font-family: var(--mono-font-family); font-size: 0.85em; background: var(--zn-3); padding: 0.15em 0.4em; border-radius: 4px; color: var(--zn-9); border: 1px solid var(--zn-4); }
    .markdown-section pre { background: var(--zn-1) !important; border: 1px solid var(--zn-4); border-radius: 8px; }
    .markdown-section pre code { background: none; border: none; padding: 0; color: var(--zn-8); font-size: 0.83em; line-height: 1.6; }

    /* ── Blockquote ─────────────────── */
    .markdown-section blockquote { border-left: 2px solid var(--zn-4); background: var(--zn-3); padding: 0.7em 1em; border-radius: 0 6px 6px 0; color: var(--zn-7); }

    /* ── Right-side page TOC ────────── */
    .page-toc { position: fixed; top: 0; right: 0; width: 200px; height: 100vh; overflow-y: auto; padding: 2em 1em 2em 0.5em; z-index: 10; }
    .page-toc .toc-title { font-family: var(--mono-font-family); font-size: 0.65em; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--zn-6); margin-bottom: 0.8em; padding-left: 0.75em; }
    .page-toc ul { list-style: none; padding: 0; margin: 0; }
    .page-toc li { margin: 0; }
    .page-toc a { display: block; padding: 0.2em 0.75em; font-size: 0.76em; color: var(--zn-6); text-decoration: none; border-left: 1px solid transparent; transition: all 0.12s; line-height: 1.5; }
    .page-toc a:hover { color: var(--zn-8); border-left-color: var(--zn-5); }
    .page-toc a.active { color: var(--zn-10); border-left-color: var(--zn-10); }
    .page-toc li[data-level="3"] a { padding-left: 1.5em; font-size: 0.72em; }

    .content { margin-right: 200px; }
    section.content { padding-right: 1em; }

    /* ── Search ─────────────────────── */
    .search input { background: var(--zn-3) !important; border: 1px solid var(--zn-4) !important; border-radius: 6px !important; color: var(--zn-9) !important; font-family: var(--base-font-family) !important; }
    .search input:focus { border-color: var(--zn-5) !important; }

    /* ── Docsify tabs ───────────────── */
    .docsify-tabs__tab { font-family: var(--mono-font-family) !important; font-size: 0.78em !important; color: var(--zn-6) !important; border: none !important; padding: 0.4em 0.8em !important; }
    .docsify-tabs__tab--active { color: var(--zn-10) !important; border-bottom: 2px solid var(--zn-10) !important; }

    /* ── Copy code button ──────────── */
    .docsify-copy-code-button { font-family: var(--mono-font-family) !important; font-size: 0.7em !important; }

    @media (max-width: 1100px) { .page-toc { display: none; } .content { margin-right: 0; } section.content { padding-right: 0; } }
    @media (max-width: 600px) { .card-grid { grid-template-columns: 1fr; } .hero h1 { font-size: 1.6em !important; } }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'LOKA',
      nameLink: '/',
      repo: 'https://github.com/rizqme/loka',
      loadSidebar: true,
      subMaxLevel: 0,
      toc: { tocMaxLevel: 3, target: 'h2, h3' },
      search: { placeholder: 'Search docs...', noData: 'No results', depth: 3 },
      auto2top: true,
      executeScript: true,
      tabs: { persist: true, sync: true, theme: 'classic' },
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1/dist/docsify-tabs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-go.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-protobuf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script>
    // Right-side "On this page" TOC plugin
    function pageTocPlugin(hook) {
      var tocEl;
      hook.doneEach(function() {
        if (tocEl) tocEl.remove();
        var content = document.querySelector('.markdown-section');
        if (!content) return;
        var headings = content.querySelectorAll('h2, h3');
        if (headings.length < 2) return;

        tocEl = document.createElement('div');
        tocEl.className = 'page-toc';

        var title = document.createElement('div');
        title.className = 'toc-title';
        title.textContent = 'On this page';
        tocEl.appendChild(title);

        var ul = document.createElement('ul');
        headings.forEach(function(h) {
          var li = document.createElement('li');
          var level = h.tagName.toLowerCase() === 'h3' ? '3' : '2';
          li.setAttribute('data-level', level);

          var a = document.createElement('a');
          var anchor = h.querySelector('a');
          if (anchor) a.href = anchor.getAttribute('href');
          a.textContent = h.textContent.replace(/^#/, '').trim();
          a.addEventListener('click', function(e) {
            e.preventDefault();
            h.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });

          li.appendChild(a);
          ul.appendChild(li);
        });
        tocEl.appendChild(ul);
        document.body.appendChild(tocEl);

        // Scroll spy
        var links = tocEl.querySelectorAll('a');
        function updateActive() {
          var current = null;
          headings.forEach(function(h, i) {
            if (h.getBoundingClientRect().top <= 80) current = i;
          });
          links.forEach(function(a, i) {
            a.classList.toggle('active', i === current);
          });
        }
        window.addEventListener('scroll', updateActive, { passive: true });
        updateActive();
      });
    }
    window.$docsify.plugins = (window.$docsify.plugins || []).concat(pageTocPlugin);
  </script>
</body>
</html>
