name: python
version: "1.0"
description: Python application
image: python:3.12-slim
port: 8000
build:
  - pip install -r requirements.txt
include:
  - "*.py"
  - requirements.txt
  - pyproject.toml
  - templates/
  - static/
start: python -m gunicorn app:app --bind 0.0.0.0:8000
health:
  path: /
  interval: 10
  timeout: 5
  retries: 3
