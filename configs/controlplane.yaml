# LOKA Control Plane Configuration — Single Node (Dev Mode)
role: all              # "all" (CP + embedded worker) or "controlplane" (CP only)
mode: single

listen_addr: ":6840"
grpc_addr: ":6841"

# TLS is enabled by default (auto-generated certificates).
# To use your own certs:
# tls:
#   cert: /etc/loka/tls/server.crt
#   key: /etc/loka/tls/server.key
#   ca_cert: /etc/loka/tls/ca.crt
# To disable TLS (not recommended):
# tls:
#   auto: false

database:
  driver: sqlite
  dsn: "loka.db"

coordinator:
  type: local

objectstore:
  type: local
  path: "/tmp/loka-data/artifacts"

scheduler:
  strategy: spread
