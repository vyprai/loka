# LOKA Control Plane Configuration — HA Mode (Production)
role: controlplane
mode: ha

listen_addr: ":6840"
grpc_addr: ":6841"

database:
  driver: postgres
  dsn: "postgres://loka:loka@localhost:5432/loka?sslmode=disable"

coordinator:
  type: raft
  address: "0.0.0.0:6842"     # Raft transport bind address
  node_id: "cp-1"             # Unique ID for this node
  data_dir: "/var/loka/raft"  # Raft log and snapshot storage
  bootstrap: true              # Set true only for the first node
  # peers:                     # Other CP nodes (for multi-node HA)
  #   - "10.0.0.2:6842"
  #   - "10.0.0.3:6842"

objectstore:
  type: s3
  bucket: "loka-artifacts"
  region: "us-east-1"

scheduler:
  strategy: spread

